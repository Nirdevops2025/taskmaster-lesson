name: ci_exercise

on: 
  pull_request:
    branches:
      - main
      
jobs:
  build:
    runs-on: ubuntu-latest
        steps:
            - name: Clone Taskmaster Lesson Repository
                run: git clone https://github.com/Nirdevops2025/taskmaster-lesson
            
            - name: checkout code
                uses: actions/checkout@v4

            - name: Set up Python 3.12
                uses: actions/setup-python@v5
                    with:
                        python-version: '3.12'     
            - name: Install dependencies
                run:
                    python -m pip install --upgrade pip
                    pip install -r requirements.txt    